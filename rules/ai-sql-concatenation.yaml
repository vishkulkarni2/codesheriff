rules:
  # ---------------------------------------------------------------------------
  # ai-sql-concatenation
  # Detects SQL queries built with string concatenation or template literals.
  #
  # AI coding assistants frequently generate SQL with string interpolation --
  # even when the variable names sound safe (userId, email, id). This is a
  # SQL injection vulnerability regardless of how the variable is named.
  # ---------------------------------------------------------------------------

  - id: ai-sql-template-literal
    pattern-either:
      - pattern: $DB.query(`...`)
      - pattern: $DB.query('...' + $VAR + '...')
      - pattern: $DB.execute(`...`)
    message: >
      SQL query constructed with string interpolation/concatenation. This is a SQL injection
      vulnerability -- use parameterized queries: db.query('SELECT ... WHERE id = $1', [id]).
      Even if the variable looks safe, it may be attacker-controlled.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-89
      owasp: A03:2021 - Injection
      ai-specific: true
      fix: Use parameterized queries (prepared statements) with placeholder parameters.

  - id: ai-sql-concat-python
    pattern-either:
      - pattern: $CURSOR.execute("..." + $VAR + "...")
      - pattern: $CURSOR.execute(f"...")
      - pattern: $CURSOR.execute("..." % $VAR)
      - pattern: $CURSOR.execute("..." % ($VAR,))
    message: >
      SQL query built with string concatenation or f-string in Python.
      Use parameterized queries: cursor.execute('SELECT ... WHERE id = %s', (value,))
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: CWE-89
      ai-specific: true

  - id: ai-sql-concat-prisma-raw
    pattern-either:
      - pattern: prisma.$queryRaw(`...`)
      - pattern: prisma.$executeRaw(`...`)
    message: >
      Prisma $queryRaw used with template literal interpolation -- this bypasses Prisma's
      parameterization. Use Prisma.sql tagged template or $queryRaw with separate params array.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-89
      ai-specific: true

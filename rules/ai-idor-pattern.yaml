# DISABLED: ai-idor-pattern rules
#
# These rules were generating the majority of false positives on cal.com
# TypeScript PRs (est. 100-150 of 214 FPs). Root cause:
#
# 1. Prisma-based apps (cal.com, etc.) place authorization at the route
#    middleware/framework level, not at the query level. A findUnique
#    without userId in the WHERE clause is NOT an IDOR if the route is
#    protected by auth middleware.
#
# 2. The pattern-not exclusions were too narrow — they only skipped when
#    userId appeared IN the same findUnique call, missing higher-level auth.
#
# 3. These rules mapped to Severity.HIGH (semgrep WARNING) + SECURITY category,
#    which bypassed the LLM verifier entirely. Every Prisma lookup without
#    userId was kept as a finding unconditionally.
#
# Resolution: IDOR detection is now handled exclusively by the
# AuthFlowValidator LLM detector, which understands authorization context.
# If re-enabling, scope to files that are known API handlers with no
# upstream auth middleware (very hard to determine statically).
#
# To re-enable: uncomment the rules: block below and restore rule content.
rules: []

rules:
  # ---------------------------------------------------------------------------
  # ai-missing-rate-limit
  # Detects auth endpoints without rate limiting middleware applied.
  #
  # AI-generated auth routes commonly omit rate limiting, making them
  # vulnerable to brute-force attacks on passwords and OTPs.
  # ---------------------------------------------------------------------------

  - id: ai-express-auth-no-ratelimit
    patterns:
      - pattern: |
          $APP.post('/login', $HANDLER)
      - pattern: |
          $APP.post('/auth/login', $HANDLER)
      - pattern: |
          $APP.post('/api/login', $HANDLER)
      - pattern: |
          $ROUTER.post('/login', $HANDLER)
    pattern-not:
      - pattern: |
          $APP.post('/login', rateLimit(...), $HANDLER)
      - pattern: |
          $APP.post('/login', limiter, $HANDLER)
    message: >
      Login endpoint registered without visible rate limiting middleware.
      Add express-rate-limit or similar to prevent brute-force attacks:
      app.post('/login', rateLimit({ windowMs: 15*60*1000, max: 10 }), handler)
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-307
      owasp: A07:2021 - Identification and Authentication Failures
      ai-specific: true

  - id: ai-express-auth-token-no-ratelimit
    patterns:
      - pattern: |
          $APP.post('/token', $HANDLER)
      - pattern: |
          $APP.post('/auth/token', $HANDLER)
      - pattern: |
          $APP.post('/oauth/token', $HANDLER)
    pattern-not:
      - pattern: |
          $APP.post('/token', rateLimit(...), $HANDLER)
    message: >
      Token endpoint without rate limiting. Token endpoints are high-value brute-force targets.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-307
      ai-specific: true

  - id: ai-fastify-auth-no-ratelimit
    patterns:
      - pattern: |
          fastify.post('/login', $OPTS, $HANDLER)
      - pattern: |
          fastify.post('/login', $HANDLER)
    pattern-not:
      - pattern: |
          fastify.post('/login', { preHandler: [...rateLimit...] }, $HANDLER)
    message: >
      Fastify login route without preHandler rate limit detected.
      Use @fastify/rate-limit as a preHandler hook on auth routes.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-307
      ai-specific: true

  - id: ai-password-reset-no-ratelimit
    patterns:
      - pattern: |
          $APP.post('/forgot-password', $HANDLER)
      - pattern: |
          $APP.post('/reset-password', $HANDLER)
      - pattern: |
          $APP.post('/auth/forgot', $HANDLER)
    message: >
      Password reset endpoint without visible rate limiting.
      These endpoints are targets for account enumeration and email flooding.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: CWE-307
      ai-specific: true

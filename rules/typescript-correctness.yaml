rules:
  # ---------------------------------------------------------------------------
  # TypeScript/JavaScript Correctness Rules
  # Targets: Cal.com (TypeScript scheduling platform)
  # Based on golden comments: async forEach, unhandled promise rejections,
  # missing error handling, naming inconsistencies
  # ---------------------------------------------------------------------------

  - id: ts-async-foreach
    pattern-either:
      - pattern: $ARRAY.forEach(async ($ITEM) => { ... })
      - pattern: $ARRAY.forEach(async ($ITEM, $IDX) => { ... })
      - pattern: $ARRAY.forEach(async function($ITEM) { ... })
    message: >
      Array.forEach with an async callback does not await the promises, causing
      fire-and-forget execution. Errors will result in unhandled promise rejections
      and operations may execute concurrently without coordination. Use a for...of
      loop with await, or Promise.all(array.map(async ...)) for controlled concurrency.
    severity: ERROR
    languages: [typescript]
    metadata:
      category: correctness
      cwe: CWE-252
      benchmark-target: cal.com

  - id: ts-dayjs-reference-equality
    patterns:
      - pattern: dayjs(...) === dayjs(...)
      - pattern: dayjs(...) == dayjs(...)
    message: >
      dayjs objects should be compared with .isSame(), not === or == which compares
      object references and always returns false. Use dayjs(a).isSame(dayjs(b)) or
      dayjs(a).isSame(b, 'day') for date equality.
    severity: ERROR
    languages: [typescript]
    metadata:
      category: correctness
      cwe: CWE-595
      benchmark-target: cal.com

  - id: ts-as-any-cast
    pattern: $EXPR as any
    message: >
      Casting to `any` bypasses TypeScript's type system entirely, hiding type
      errors that could indicate real bugs. Use a specific type, a type guard,
      or `unknown` with runtime validation instead.
    severity: WARNING
    languages: [typescript]
    metadata:
      category: correctness
      cwe: CWE-704

  - id: ts-ignore-directive
    pattern-regex: "//\\s*@ts-(ignore|expect-error)"
    paths:
      exclude:
        - "*.test.ts"
        - "*.test.tsx"
        - "*.spec.ts"
        - "*.spec.tsx"
        - "**/__tests__/**"
        - "**/test/**"
        - "**/tests/**"
    message: >
      `@ts-ignore` or `@ts-expect-error` suppresses TypeScript compiler errors
      and can hide genuine type mismatches, null dereferences, or missing
      properties. Fix the underlying type error instead, or add a specific
      type annotation.
    severity: WARNING
    languages: [typescript]
    metadata:
      category: correctness
      cwe: CWE-704

  - id: ts-weak-hash-md5-sha1
    pattern-either:
      - pattern: crypto.createHash("md5")
      - pattern: crypto.createHash('md5')
      - pattern: crypto.createHash("sha1")
      - pattern: crypto.createHash('sha1')
    message: >
      MD5 and SHA-1 are cryptographically broken and must not be used for
      password hashing, integrity checks, or signatures. Use bcrypt, scrypt,
      or Argon2 for passwords; SHA-256+ for integrity.
    severity: ERROR
    languages: [typescript]
    metadata:
      category: security
      cwe: CWE-327

  # ts-suspicious-and-permission-check: DISABLED
  # Far too broad — any legitimate multi-permission guard triggers it.
  # Example: isAdmin && isOwner is a valid "must be both" check in team contexts.
  # This was generating FPs across all cal.com PRs that had role-based gates.
  # The LLM (LogicBugDetector) can detect genuine AND/OR inversions in context.
  #
  # - id: ts-suspicious-and-permission-check

  # ts-insecure-origin-check: DISABLED
  # Pattern matches `url.indexOf(...)` which is extremely common for non-security
  # purposes (substring search in URLs, logging, display). The original intent
  # was to catch security bypasses but metavariable regex matching on variable
  # *names* (not values) produces massive FPs — any variable named `url` or
  # `host` that calls indexOf triggers it, regardless of context.
  # Genuine origin-bypass bugs require LLM analysis of the full validation context.
  #
  # - id: ts-insecure-origin-check

  # ts-missing-await: DISABLED
  # The pattern (const $X = $FUNC(); ... $X.then(...)) matches intentional
  # fire-and-forget patterns and generates enormous noise on cal.com.
  # LLM detectors (LogicBugDetector) handle async misuse in context.
  #
  # - id: ts-missing-await

  # ts-catch-empty: DISABLED
  # .catch(() => {}) is an extremely common intentional pattern in TypeScript —
  # used deliberately to suppress unhandled rejection warnings for non-critical
  # operations (analytics, telemetry, cache warming). This rule was the single
  # largest source of FPs on cal.com.
  # LLM detectors can identify genuinely dangerous empty catch blocks in context.
  #
  # - id: ts-catch-empty


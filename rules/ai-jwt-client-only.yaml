rules:
  # ---------------------------------------------------------------------------
  # ai-jwt-client-only
  # Detects JWT decode/verify calls in frontend/client-side code without
  # evidence of a corresponding server-side verification.
  # ---------------------------------------------------------------------------

  - id: ai-jwt-client-only-decode
    pattern: jwt.decode($TOKEN)
    message: >
      JWT token is decoded without cryptographic verification (jwt.decode does NOT verify the
      signature). An attacker can tamper with the payload (e.g., escalate role to 'admin').
      Always use jwt.verify(token, secret) on the server side, never trust client-decoded payloads.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: auth
      cwe: CWE-347
      owasp: A07:2021 - Identification and Authentication Failures
      confidence: HIGH
      ai-specific: true
      references:
        - https://cheatsheetseries.owasp.org/cheatsheets/JSON_Web_Token_for_Java_Cheat_Sheet.html

  - id: ai-jwt-decode-role-check
    pattern: |
      const $PAYLOAD = jwt.decode($TOKEN);
      ...
      if ($PAYLOAD.$FIELD === ...) { ... }
    message: >
      Decoded JWT payload used for access control without server-side verification.
      The payload is only base64-decoded, not verified -- any client can forge this.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: auth
      cwe: CWE-345
      ai-specific: true

  - id: ai-localstorage-jwt-role
    pattern: |
      $TOKEN = localStorage.getItem(...);
      ...
      jwt.decode($TOKEN)
    message: >
      JWT retrieved from localStorage and decoded client-side. localStorage is accessible
      to any JavaScript on the page (XSS). Use httpOnly cookies for token storage and
      always validate on the server.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: auth
      cwe: CWE-522
      ai-specific: true
